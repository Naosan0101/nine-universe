spring.application.name=nine-universe
# 8080 が既に使われているときは、タスクマネージャーで java を終了するか、次のように変更する
# server.port=8081

# HTML/CSS/JS/JSON などテキスト応答を gzip で圧縮し、転送量と体感速度を改善する
server.compression.enabled=true

spring.datasource.url=jdbc:postgresql://localhost:5432/springdb
spring.datasource.username=springuser
spring.datasource.password=p@ss
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# public に既存オブジェクトがあり flyway_schema_history だけ無い場合にベースラインしてからマイグレーションする
spring.flyway.baseline-on-migrate=true
# デフォルトの baseline-version=1 だと V1__init が「既に適用済み」とみなされスキップされるため 0 にする
spring.flyway.baseline-version=0

mybatis.mapper-locations=classpath:mapper/AppUserMapper.xml,classpath:mapper/CardDefinitionMapper.xml,classpath:mapper/DeckEntryMapper.xml,classpath:mapper/DeckMapper.xml,classpath:mapper/UserCollectionMapper.xml,classpath:mapper/UserDailyMissionMapper.xml,classpath:mapper/UserWeeklyMissionMapper.xml,classpath:mapper/UserAnnouncementClaimMapper.xml,classpath:mapper/NicknameEpithetMapper.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.example.nineuniverse.domain

spring.thymeleaf.cache=false

# ログイン中ユーザーの last_access_at を DB に書き込む間隔（分）
app.last-access.db-interval-minutes=15

# Remember-Me（アプリ終了・ブラウザ再起動後も最大 1 週間は自動ログイン）。本番では app.security.remember-me.key を環境変数等で固定の長い秘密にすること。
app.security.remember-me.token-validity-seconds=604800

# ローカル検証用: ユーザー testuser がログインするたびにジェム9999・全カード20枚へリセット（セッション中は増減可）。
# server.port が 8080 でないときは無効（別ポートで起動してもリセットしたい場合は次行を false に）。
app.dev.testuser-login-reset=true
app.dev.testuser-login-reset-require-default-port=true

# Web版ログイン中ユーザー向けの「デスクトップアプリ移行」帯表示（false で無効化）。インストーラは static 配下に配置するか、パスを変更してください。
app.web-desktop-migration-notice.enabled=true
app.web-desktop-migration-notice.installer-resource-path=/downloads/Nine Universe Setup 0.1.0.exe
