# VPS / PaaS: 割り当てポート（Render / Fly.io 等は PORT を渡す）
server.port=${PORT:8080}
# 外部から HTTP で届くようにすべてのインターフェースで待ち受け
server.address=0.0.0.0
spring.thymeleaf.cache=true

# /css, /js, /images 等の静的リソースに Cache-Control を付与（ブラウザ・CDN の再取得を減らす）
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.cache.cachecontrol.max-age=7d

# Nginx 等で TLS 終端するとき、スキーム判定に X-Forwarded-* を使う
server.forward-headers-strategy=framework

# Remember-Me 署名鍵（デプロイごとに変わると既存クッキーが無効になる）。未設定時はビルド内のデフォルト（運用では APP_REMEMBER_ME_KEY の設定を推奨）。
app.security.remember-me.key=${APP_REMEMBER_ME_KEY:nine-universe-remember-me-production-default}

# CSS/JS の ?v= に付与。ビルド時刻に加えて変えると、同一 JAR でも全ユーザーの静的キャッシュを無効化できる。次回の強制更新時は値を変える。
app.static-asset-version-suffix=superreload-20260430

# デスクトップ更新案内: クライアントの package.json version より新しいときログイン後にダイアログ。リリース時に latest を上げ、exe を JAR 同梱の配布 URL に合わせる。
app.desktop-client.update.latest-version=0.1.1
app.desktop-client.update.installer-url=https://nine-universe.jp/downloads/nine-universe-setup-0.1.1.exe
