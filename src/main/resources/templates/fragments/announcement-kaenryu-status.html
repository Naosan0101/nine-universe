<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="card">
		<article class="announcement-modal__card"
		         th:if="${announcementListKaenryuStatus and (kaenryuStatusAnnouncementClaimable or kaenryuStatusAnnouncementClaimed or kaenryuStatusAnnouncementExpiredUnclaimed or kaenryuStatusAnnouncementFutureUnclaimed)}">
			<div class="announcement-modal__mailbox">
				<div class="announcement-modal__mailbox-body">
					<p class="announcement-modal__card-text">・「火炎竜」のステータスを修正しました。</p>
				</div>
				<aside class="announcement-modal__mailbox-aside">
					<span th:if="${kaenryuStatusAnnouncementClaimable}" class="announcement-modal__deadline">受け取り期限 30日</span>
					<form th:if="${kaenryuStatusAnnouncementClaimable}"
					      th:action="@{/home/announcements/kaenryu-status/claim}"
					      method="post"
					      class="announcement-modal__gem-form">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
						<button type="submit" class="btn btn--primary announcement-modal__gem-btn"
						        th:text="|${kaenryuStatusAnnouncementGemAmount}ジェム|">3ジェム</button>
					</form>
					<p th:if="${kaenryuStatusAnnouncementClaimed}" class="announcement-modal__card-status ok">受け取り済み</p>
					<p th:if="${kaenryuStatusAnnouncementExpiredUnclaimed}" class="announcement-modal__card-status muted">受け取り期限が過ぎました</p>
					<p th:if="${kaenryuStatusAnnouncementFutureUnclaimed}" class="announcement-modal__card-status muted">受け取り開始前です</p>
				</aside>
			</div>
		</article>
</th:block>
</body>
</html>
