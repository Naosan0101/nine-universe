<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>ひとりで対戦 — モード選択 — ナインユニバース</title>
	<link rel="stylesheet" th:href="@{/css/app.css(v=${assetVersion})}"/>
</head>
<body class="page">
<header class="topbar">
	<h1 class="game-title">ひとりで対戦</h1>
	<a class="btn btn--ghost" th:href="@{/home}">ホーム</a>
</header>
<div class="container stack" style="max-width:36rem">
	<section class="panel stack">
		<h2 style="margin-top:0;">カジュアル対戦</h2>
		<p class="muted" style="margin:0 0 0.75rem;">1デッキで1ゲーム。CPUと対戦します。</p>
		<a class="btn btn--primary" th:href="@{/battle/cpu/casual}">カジュアルCPU戦へ</a>
	</section>
	<section class="panel stack">
		<h2 style="margin-top:0;">リーグ対戦（CPU）</h2>
		<p class="muted" style="margin:0 0 0.75rem;">リーグデッキで2本先取。CPUも固定の2デッキを使います。</p>
		<a class="btn btn--primary" th:href="@{/battle/cpu/league}">リーグCPU戦へ</a>
	</section>
</div>
<th:block th:replace="~{fragments/authenticated-common-tail :: tail}"></th:block>
</body>
</html>
