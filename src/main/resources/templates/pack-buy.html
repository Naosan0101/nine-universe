<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>カードパック購入 — ナインユニバース</title>
	<link rel="stylesheet" th:href="@{/css/app.css(v=${assetVersion})}"/>
</head>
<body class="page page--theme-arcane page--pack page--single-screen-hub" th:attr="data-user-gems=${gems}">
<header class="topbar">
	<div th:replace="~{fragments/game-title-brand :: brand}"></div>
	<div class="topbar__meta">
		<span class="topbar__hub-meta muted">ジェム <strong th:text="${gems}">0</strong></span>
		<a class="btn btn--ghost" th:href="@{/home}">ホーム</a>
	</div>
</header>

<div class="container hub-main">
	<section class="panel pack-buy-head" th:if="${error}">
		<p class="error pack-buy-head__error" th:text="${error}"></p>
	</section>

	<section class="panel pack-starter-gift"
	         th:if="${starterGiftStandard1Remaining != null and starterGiftStandard1Remaining > 0}">
		<h2 class="pack-starter-gift__title">新規登録プレゼント</h2>
		<p class="pack-starter-gift__text">
			「スタンダードパック1」を <strong th:text="${starterGiftStandard1Remaining}">10</strong> パックお渡ししています。
		</p>
		<form th:action="@{/pack/open-starter-gift}" method="post" class="pack-starter-gift__form">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
			<button type="submit" class="btn btn--primary">スタンダードパック1 を1パック開ける（0ジェム）</button>
		</form>
	</section>

	<section class="pack-buy pack-buy--shop">
		<div class="pack-buy__grid">
			<div class="pack-buy__cell" th:each="slot : ${packShopSlots}">
				<button type="button" class="pack-buy__item"
				        th:classappend="${!slot.unlocked()} ? ' pack-buy__item--locked js-season-locked' : ''"
				        th:attr="data-pack-type=${slot.unlocked()} ? ${slot.packTypeParam()} : null,
				                 data-pack-name=${slot.displayName()},
				                 data-pack-cost=${slot.unlocked()} ? ${slot.cost()} : null,
				                 data-pack-locked=${!slot.unlocked()},
				                 data-season-lock-name=${slot.displayName()},
				                 data-season-lock-hint=${!slot.unlocked()} ? ${slot.unlockHint()} : null">
					<div class="pack-buy__art">
						<img class="pack-buy__img" th:if="${slot.unlocked()}"
						     th:src="|${contextPath != null ? contextPath : ''}${slot.artWebPath()}?v=${packArtCacheKey}|"
						     th:alt="${slot.displayName()}" onerror="this.hidden=true; this.removeAttribute('src');"/>
					</div>
					<span class="pack-buy__label" th:text="${slot.displayName()}">パック</span>
					<span class="pack-buy__price" th:attr="aria-label=${slot.unlocked()} ? |価格${slot.cost()}ジェム| : null">
						<span class="pack-buy__price-num" th:text="${slot.unlocked()} ? ${slot.cost()} : '？'">3</span>
						<span class="pack-buy__price-unit" th:if="${slot.unlocked()}">ジェム</span>
					</span>
				</button>
				<button type="button" class="btn btn--ghost pack-buy__detail"
				        th:attr="data-open-pack-detail=${slot.detailModalId()}">詳細を見る</button>
			</div>
		</div>
	</section>

<section id="pack-buy-confirm-bar" class="pack-buy-confirm" hidden>
	<div class="pack-buy-confirm__inner">
		<div class="pack-buy-confirm__text">
			<p class="pack-buy-confirm__title" id="pack-buy-confirm-title" role="status" aria-live="polite">
				<span class="pack-buy-confirm__question" id="pack-buy-confirm-question" hidden>
					<span class="pack-buy-confirm__name" id="pack-buy-confirm-name"></span><span class="pack-buy-confirm__suffix">を購入しますか？</span>
				</span>
			</p>
			<p class="pack-buy-confirm__payment" id="pack-buy-confirm-payment" hidden role="status"></p>
		</div>
		<div class="pack-buy-confirm__actions">
			<button type="button" class="btn btn--ghost pack-buy-confirm__btn-cancel" id="pack-buy-cancel" disabled>キャンセル</button>
			<form th:action="@{/pack/buy}" method="post" class="inline pack-buy-confirm__buy-form">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
				<input type="hidden" name="type" id="pack-buy-type" value=""/>
				<button type="submit" class="btn btn--primary pack-buy-confirm__btn-buy" id="pack-buy-confirm" disabled>購入</button>
			</form>
		</div>
	</div>
</section>
 </div>

<div th:each="slot : ${packShopSlots}" th:id="${slot.detailModalId()}" class="pack-detail-modal" hidden>
	<div class="pack-detail-modal__backdrop" data-pack-detail-close tabindex="-1" aria-hidden="true"></div>
	<div class="pack-detail-modal__panel" role="dialog" aria-modal="true"
	     th:attr="aria-labelledby=${slot.detailModalId()} + '-title'">
		<button type="button" class="pack-detail-modal__close" data-pack-detail-close aria-label="閉じる">×</button>
		<h2 th:id="${slot.detailModalId()} + '-title'" class="pack-detail-modal__heading" th:text="${slot.detailHeading()}">パック</h2>
		<p class="pack-detail-modal__price" th:if="${slot.unlocked()}">
			<span class="muted">1パックあたりの支払い</span> <strong th:text="|${slot.cost()}ジェム|">3ジェム</strong>
		</p>
		<p class="pack-detail-modal__price" th:if="${!slot.unlocked()}"><span class="muted">1パックあたりの支払い</span> <strong>？？？？</strong></p>
		<h3 class="pack-detail-modal__sub">レア度別の排出率</h3>
		<ul class="pack-detail-modal__rates" th:if="${slot.unlocked()}">
			<li th:each="r : ${packRarityRates}">
				<span class="pack-detail-modal__rate-label" th:text="${r.label}">レジェンダリー</span>
				<span class="pack-detail-modal__rate-pct" th:text="${r.percent}">2%</span>
			</li>
		</ul>
		<ul class="pack-detail-modal__rates" th:if="${!slot.unlocked()}">
			<li><span class="pack-detail-modal__rate-label">？？？？</span><span class="pack-detail-modal__rate-pct">？？？？</span></li>
		</ul>
		<h3 class="pack-detail-modal__sub">このパックから排出されるカード</h3>
		<ul class="pack-detail-modal__cards">
			<li th:each="line : ${slot.previewLines()}"
			    class="pack-detail-modal__card-row"
			    th:classappend="${slot.unlocked()} ? ${'pack-detail-modal__card-row--' + line.rarityCode} : ''">
				<span class="pack-detail-modal__card-name" th:text="${line.name}">名前</span>
				<span class="pack-detail-modal__card-rarity" th:text="${line.rarityLabel}">コモン</span>
			</li>
		</ul>
	</div>
</div>

<th:block th:replace="~{fragments/season-lock-tooltip :: tooltip}"></th:block>
<script th:src="@{/js/pack-buy.js(v=${assetVersion})}"></script>
<th:block th:replace="~{fragments/authenticated-common-tail :: tail}"></th:block>
</body>
</html>
