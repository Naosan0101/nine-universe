<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>カードリサイクル — ナインユニバース</title>
	<link rel="stylesheet" th:href="@{/css/app.css(v=${assetVersion})}"/>
</head>
<body class="page page--theme-arcane page--recycle page--recycle-hub page--single-screen-hub">
<header class="topbar">
	<div th:replace="~{fragments/game-title-brand :: brand}"></div>
	<div class="topbar__meta">
		<span class="topbar__hub-meta muted">クリスタル <strong th:text="${recycleCrystal}">0</strong></span>
		<span class="topbar__hub-meta muted">ジェム <strong th:text="${gems}">0</strong></span>
		<a class="btn btn--ghost" th:href="@{/home}">ホーム</a>
	</div>
</header>

<div class="hub-screen-title">
	<h2 class="hub-screen-title__h">カードリサイクル</h2>
</div>

<p class="error" th:if="${recycleError != null}" th:text="${recycleError}"></p>
<p class="ok" th:if="${recycleSuccess != null}" th:text="${recycleSuccess}"></p>

<div class="container hub-main">
	<section class="panel recycle-hub-section">
		<h2 class="recycle-hub-section__title">カードをクリスタルに変換</h2>
		<p class="muted" style="margin-top:0">不要なカードをクリスタルに変換します。</p>
		<a class="btn btn--primary" th:href="@{/recycle/cards}">カードをクリスタルに変換</a>
	</section>

	<section class="panel recycle-hub-section recycle-hub-section--crystal-to-card">
		<h2 class="recycle-hub-section__title">クリスタルをカードに交換</h2>
		<p class="muted recycle-hub-section__lead">所持クリスタルで、レジェンダリー1枚との交換または確定パックの開封ができます。</p>
		<div class="recycle-shop recycle-shop--hub-cards">
			<article class="recycle-hub-offer recycle-hub-offer--legendary-pick">
				<div class="recycle-hub-offer__body">
					<h3 class="recycle-hub-offer__title">レジェンダリー1枚と交換</h3>
					<p class="recycle-hub-offer__cost"><span class="recycle-hub-offer__cost-num" th:text="${costLegendaryPick}">10000</span><span class="recycle-hub-offer__cost-unit">クリスタル</span></p>
				</div>
				<div class="recycle-hub-offer__action">
					<a class="btn btn--primary recycle-hub-offer__btn" th:href="@{/recycle/legendary-pick}">選ぶ</a>
				</div>
			</article>
			<article class="recycle-hub-offer recycle-hub-offer--legendary-pack">
				<div class="recycle-hub-offer__body">
					<h3 class="recycle-hub-offer__title">レジェンダリー確定パック</h3>
					<p class="recycle-hub-offer__cost"><span class="recycle-hub-offer__cost-num" th:text="${costLegendaryPack}">5000</span><span class="recycle-hub-offer__cost-unit">クリスタル</span></p>
				</div>
				<div class="recycle-hub-offer__action">
					<a class="btn btn--primary recycle-hub-offer__btn" th:href="@{/recycle/open/legendary}">開封へ</a>
				</div>
			</article>
			<article class="recycle-hub-offer recycle-hub-offer--epic-plus-pack">
				<div class="recycle-hub-offer__body">
					<h3 class="recycle-hub-offer__title">エピック以上確定パック</h3>
					<p class="recycle-hub-offer__cost"><span class="recycle-hub-offer__cost-num" th:text="${costEpicPlusPack}">2000</span><span class="recycle-hub-offer__cost-unit">クリスタル</span></p>
				</div>
				<div class="recycle-hub-offer__action">
					<a class="btn btn--primary recycle-hub-offer__btn" th:href="@{/recycle/open/epic-plus}">開封へ</a>
				</div>
			</article>
			<article class="recycle-hub-offer recycle-hub-offer--epithet-gacha">
				<div class="recycle-hub-offer__body">
					<h3 class="recycle-hub-offer__title">二つ名ガチャ</h3>
					<p class="recycle-hub-offer__cost"><span class="recycle-hub-offer__cost-num" th:text="${costEpithetGacha}">500</span><span class="recycle-hub-offer__cost-unit">クリスタル</span></p>
				</div>
				<div class="recycle-hub-offer__action">
					<a class="btn btn--primary recycle-hub-offer__btn" th:href="@{/recycle/epithet-gacha}">引く</a>
				</div>
			</article>
		</div>
	</section>

	<section class="panel recycle-hub-section">
		<h2 class="recycle-hub-section__title">クリスタルをジェムに交換</h2>
		<p class="muted" style="margin-top:0"><span th:text="${crystalPerGem}">300</span>クリスタルで1ジェムに交換できます。</p>
		<form th:action="@{/recycle/crystal-to-gems}" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
			<button type="submit" class="btn btn--ghost">交換する</button>
		</form>
	</section>
</div>
<th:block th:replace="~{fragments/authenticated-common-tail :: tail}"></th:block>
</body>
</html>
