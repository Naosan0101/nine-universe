<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>対戦申し込み — ナインユニバース</title>
	<link rel="stylesheet" th:href="@{/css/app.css(v=${assetVersion})}"/>
</head>
<body class="page page--theme-arcane">
<header class="topbar">
	<h1 class="game-title">対戦申し込み</h1>
	<a class="btn btn--ghost" th:href="@{/battle/pvp}">だれかと対戦へ</a>
</header>

<div class="container stack">
	<p class="muted" th:if="${challengerName != null}">
		<span th:text="${challengerName}">ユーザー</span>さんから対戦の申し込みです。使うデッキを選んで承諾してください。
	</p>
	<p class="error" th:if="${error}" th:text="${error}"></p>

	<p th:if="${decks == null || decks.isEmpty()}" class="muted">
		デッキがありません。先にデッキを8枚作成してください。
	</p>

	<form th:if="${decks != null && !decks.isEmpty()}"
	      th:action="@{/battle/pvp/invite/{inviteId}/join(inviteId=${inviteId})}"
	      method="post" class="stack panel panel--narrow">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		<label>使うデッキ
			<select name="deckId" required>
				<option th:each="d : ${decks}" th:value="${d.id}" th:text="${d.name}">デッキ</option>
			</select>
		</label>
		<div class="friends-page__actions" style="margin-top:0.75rem">
			<button type="submit" class="btn btn--primary">承諾してバトル開始</button>
		</div>
	</form>

	<form th:action="@{/battle/pvp/invite/{inviteId}/decline(inviteId=${inviteId})}" method="post" class="stack" style="margin-top:1rem">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		<button type="submit" class="btn btn--ghost">断る</button>
	</form>
</div>
<script th:src="@{/js/battle-deck-select.js(v=${assetVersion})}"></script>
<th:block th:replace="~{fragments/authenticated-common-tail :: tail}"></th:block>
</body>
</html>
