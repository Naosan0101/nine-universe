<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>レジェンダリー交換 — ナインユニバース</title>
	<link rel="stylesheet" th:href="@{/css/app.css(v=${assetVersion})}"/>
	<meta name="nine_universe_context_path" th:content="${contextPath != null ? contextPath : ''}"/>
	<meta name="card_plate_fallback" th:content="|${contextPath != null ? contextPath : ''}${cardPlateUrl}|"/>
	<meta name="card_data_fallback" th:content="|${contextPath != null ? contextPath : ''}${cardDataUrl}|"/>
	<meta name="_csrf" th:content="${_csrf.token}"/>
	<meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body class="page page--library page--recycle-legendary">
<header class="topbar">
	<h1 class="game-title">レジェンダリーを選ぶ</h1>
	<a class="btn btn--ghost" th:href="@{/recycle}">戻る</a>
</header>

<div class="container">
	<section class="panel">
		<div class="recycle-legendary-toolbar">
			<div class="recycle-legendary-toolbar__row">
				<p class="muted recycle-legendary-toolbar__crystal">所持クリスタル: <strong id="recycle-legendary-crystal-val" th:text="${recycleCrystal}">0</strong>
					（交換に <span th:text="${costLegendaryPick}">10000</span>クリスタル必要）</p>
				<form th:action="@{/recycle/legendary-pick/confirm}" method="post" id="legendary-pick-trade-form" class="recycle-legendary-trade-form">
					<input type="hidden" name="cardId" id="legendary-pick-card-id" value=""/>
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
					<button type="submit" class="btn btn--primary" id="legendary-pick-confirm-btn" disabled>決定</button>
				</form>
			</div>
			<p id="recycle-legendary-ajax-msg" class="muted" hidden role="status" aria-live="polite"></p>
			<div class="lib-page-toolbar">
				<div class="lib-page-toolbar__controls">
					<label class="lib-page-field">検索
						<input type="search" id="recycle-legendary-search" class="lib-page-input" autocomplete="off" placeholder="カード名・効果の一部"/>
					</label>
					<label class="lib-page-field">種族
						<span class="tribe-filter" data-toolbar-filter data-filter-set="tribe">
							<button type="button" class="tribe-filter__trigger lib-page-select" aria-expanded="false" aria-haspopup="listbox">すべて</button>
							<ul class="tribe-filter__list" role="listbox" hidden></ul>
							<input type="hidden" id="recycle-legendary-filter-attr" class="tribe-filter__value" value=""/>
						</span>
					</label>
					<label class="lib-page-field">種類
						<span class="tribe-filter" data-toolbar-filter data-filter-set="cardKind">
							<button type="button" class="tribe-filter__trigger lib-page-select" aria-expanded="false" aria-haspopup="listbox">すべて</button>
							<ul class="tribe-filter__list" role="listbox" hidden></ul>
							<input type="hidden" id="recycle-legendary-filter-card-kind" class="tribe-filter__value" value=""/>
						</span>
					</label>
					<label class="lib-page-field">パック
						<span class="tribe-filter" data-toolbar-filter data-filter-set="pack">
							<button type="button" class="tribe-filter__trigger lib-page-select" aria-expanded="false" aria-haspopup="listbox">すべて</button>
							<ul class="tribe-filter__list" role="listbox" hidden></ul>
							<input type="hidden" id="recycle-legendary-filter-pack" class="tribe-filter__value" value=""/>
						</span>
					</label>
					<label class="lib-page-field">コスト
						<span class="tribe-filter" data-toolbar-filter data-filter-set="cost">
							<button type="button" class="tribe-filter__trigger lib-page-select" aria-expanded="false" aria-haspopup="listbox">すべて</button>
							<ul class="tribe-filter__list" role="listbox" hidden></ul>
							<input type="hidden" id="recycle-legendary-filter-cost" class="tribe-filter__value" value=""/>
						</span>
					</label>
					<label class="lib-page-field">強さ
						<span class="tribe-filter" data-toolbar-filter data-filter-set="power">
							<button type="button" class="tribe-filter__trigger lib-page-select" aria-expanded="false" aria-haspopup="listbox">すべて</button>
							<ul class="tribe-filter__list" role="listbox" hidden></ul>
							<input type="hidden" id="recycle-legendary-filter-power" class="tribe-filter__value" value=""/>
						</span>
					</label>
					<label class="lib-page-field">★
						<span class="tribe-filter" data-toolbar-filter data-filter-set="rarity">
							<button type="button" class="tribe-filter__trigger lib-page-select" aria-expanded="false" aria-haspopup="listbox">すべて</button>
							<ul class="tribe-filter__list" role="listbox" hidden></ul>
							<input type="hidden" id="recycle-legendary-filter-rarity" class="tribe-filter__value" value=""/>
						</span>
					</label>
				</div>
			</div>
		</div>
		<p id="recycle-legendary-empty" class="muted" hidden>一致するカードがありません。</p>
		<div id="recycle-legendary-grid" class="library-grid">
			<th:block th:each="c : ${legendaryCards}">
				<div th:replace="~{fragments/recycle-legendary-card :: cell(c=${c}, cp=${contextPath})}"></div>
			</th:block>
		</div>
	</section>
</div>

<div id="library-tooltip" class="deck-tooltip library-page-tooltip" hidden role="tooltip">
	<div class="deck-tooltip__inner">
		<p class="deck-tooltip__name"></p>
		<dl class="deck-tooltip__stats">
			<div><dt>種族</dt><dd class="deck-tooltip__attr"></dd></div>
			<div><dt>コスト</dt><dd class="deck-tooltip__cost"></dd></div>
			<div><dt>強さ</dt><dd class="deck-tooltip__power"></dd></div>
			<div><dt>★</dt><dd class="deck-tooltip__rarity"></dd></div>
			<div><dt>パック</dt><dd class="deck-tooltip__pack"></dd></div>
		</dl>
		<p class="deck-tooltip__label">効果</p>
		<p class="deck-tooltip__ability"></p>
	</div>
</div>

<div id="library-detail-modal" class="library-detail-modal" hidden>
	<div class="library-detail-modal__panel" role="dialog" aria-modal="true" aria-label="カード詳細">
		<button type="button" class="library-detail-modal__close" data-library-detail-close aria-label="閉じる">×</button>
		<div id="library-detail-art" class="library-detail-modal__art-wrap library-detail-modal__art-wrap--nav">
			<button type="button" id="lib-modal-nav-prev" class="library-detail-modal__card-nav library-detail-modal__card-nav--prev" hidden aria-label="前のカード">‹</button>
			<button type="button" id="lib-modal-nav-next" class="library-detail-modal__card-nav library-detail-modal__card-nav--next" hidden aria-label="次のカード">›</button>
			<div class="card-face card-face--layered" id="library-modal-card-face">
				<div class="card-face__stack" aria-hidden="true">
					<img id="lib-modal-layer-base" class="card-face__layer-img card-face__layer-img--base" th:src="|${contextPath != null ? contextPath : ''}${cardPlateUrl}|" alt="" onerror="this.hidden=true; this.removeAttribute('src');"/>
					<img id="lib-modal-layer-portrait" class="card-face__layer-img card-face__layer-img--portrait" alt="" hidden/>
					<img id="lib-modal-layer-bar" class="card-face__layer-img card-face__layer-img--bar" alt="" hidden/>
					<img id="lib-modal-layer-frame" class="card-face__layer-img card-face__layer-img--frame" th:src="|${contextPath != null ? contextPath : ''}${cardDataUrl}|" alt="" fetchpriority="high" onerror="this.hidden=true; this.removeAttribute('src');"/>
				</div>
				<div class="card-face__layer card-face__datum">
					<span id="lib-modal-cost" class="card-face__cost"></span>
					<span id="lib-modal-power" class="card-face__power"></span>
					<span id="lib-modal-name" class="card-face__name"></span>
					<span id="lib-modal-attr" class="card-face__attr-label"></span>
					<span id="lib-modal-rarity" class="card-face__rarity"></span>
					<span id="lib-modal-pack-initial" class="card-face__pack-initial" hidden>STD</span>
				</div>
				<div class="card-face__layer card-face__narrative">
					<div id="lib-modal-ability" class="card-face__ability"></div>
				</div>
				<div id="lib-modal-spark" class="card-spark" hidden aria-hidden="true"></div>
			</div>
		</div>
		<div class="library-detail-modal__body">
			<p class="library-detail-modal__name-label">カード</p>
			<h2 class="library-detail-modal__title" id="lib-modal-side-title">—</h2>
			<dl class="library-detail-modal__stats">
				<dt>種族：</dt><dd id="lib-modal-side-attr">—</dd>
				<dt>コスト：</dt><dd id="lib-modal-side-cost">—</dd>
				<dt>強さ：</dt><dd id="lib-modal-side-power">—</dd>
				<dt>レアリティ：</dt><dd id="lib-modal-side-rarity">—</dd>
				<dt>収録パック：</dt><dd id="lib-modal-side-pack" class="library-detail-modal__pack">—</dd>
			</dl>
			<p class="library-detail-modal__ability-label">効果</p>
			<div class="library-detail-modal__detail library-detail-modal__detail--rich" id="lib-modal-side-ability"></div>
		</div>
	</div>
</div>

<script th:src="@{/js/lib-detail-modal-fossil.js(v=${assetVersion})}"></script>
<script th:src="@{/js/card-spark.js(v=${assetVersion})}"></script>
<script th:src="@{/js/card-face-layer.js(v=${assetVersion})}"></script>
<script th:src="@{/js/tribe-filter-dropdown.js(v=${assetVersion})}"></script>
<script th:src="@{/js/library.js(v=${assetVersion})}"></script>
<script th:src="@{/js/recycle-legendary.js(v=${assetVersion})}"></script>
<th:block th:replace="~{fragments/authenticated-common-tail :: tail}"></th:block>
</body>
</html>
