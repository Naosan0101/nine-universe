<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>CPUリーグ対戦 — ナインユニバース</title>
	<link rel="stylesheet" th:href="@{/css/app.css(v=${assetVersion})}"/>
</head>
<body class="page">
<header class="topbar">
	<h1 class="game-title">CPUリーグ対戦</h1>
	<a class="btn btn--ghost" th:href="@{/battle/cpu}">戻る</a>
</header>

<div class="container">
	<p class="error" th:if="${error}" th:text="${error}"></p>
	<p th:if="${leagueSets == null || leagueSets.isEmpty()}" class="muted">
		リーグデッキがありません。<a th:href="@{/decks}">デッキ作成</a>で作成してください。
	</p>
	<th:block th:if="${leagueSets != null && !leagueSets.isEmpty()}">
		<section class="panel measure">
			<p class="muted" style="margin:0;">
				第1ゲームで使うデッキを選び、CPU（固定の2デッキ）と2本先取で対戦します。
			</p>
		</section>
		<div class="cpu-menu-modes">
			<section class="panel panel--narrow stack">
				<h2 style="margin-top:0;">CPU（オリジン）</h2>
				<form th:action="@{/battle/cpu/league/start}" method="post" class="stack js-cpu-league-start-form">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
					<input type="hidden" name="cpuMode" value="ORIGIN"/>
					<label>リーグデッキ
						<select name="leagueSetId" class="js-cpu-league-set-select" required>
							<option th:each="s : ${leagueSets}" th:value="${s.setId}"
							        th:text="|${s.setName}（${s.deckSlot1Name} / ${s.deckSlot2Name}）|"
							        th:attr="data-slot1-name=${s.deckSlot1Name},data-slot2-name=${s.deckSlot2Name}">セット</option>
						</select>
					</label>
					<label>第1ゲームで使うデッキ
						<select name="humanDeckSlot" class="js-cpu-league-slot-select" required>
							<option value="1">デッキ1</option>
							<option value="2">デッキ2</option>
						</select>
					</label>
					<label>強さ
						<select name="level" required>
							<option value="1">レベル1（やさしい）</option>
							<option value="2">レベル2</option>
							<option value="3">レベル3（強い）</option>
						</select>
					</label>
					<button type="submit" class="btn btn--primary">バトル開始</button>
				</form>
			</section>
			<section class="panel panel--narrow stack" th:if="${seasonCpuAdvancedUnlocked}">
				<h2 style="margin-top:0;">CPU（アドバンスド）</h2>
				<form th:action="@{/battle/cpu/league/start}" method="post" class="stack js-cpu-league-start-form">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
					<input type="hidden" name="cpuMode" value="ADVANCED"/>
					<label>リーグデッキ
						<select name="leagueSetId" class="js-cpu-league-set-select" required>
							<option th:each="s : ${leagueSets}" th:value="${s.setId}"
							        th:text="|${s.setName}（${s.deckSlot1Name} / ${s.deckSlot2Name}）|"
							        th:attr="data-slot1-name=${s.deckSlot1Name},data-slot2-name=${s.deckSlot2Name}">セット</option>
						</select>
					</label>
					<label>第1ゲームで使うデッキ
						<select name="humanDeckSlot" class="js-cpu-league-slot-select" required>
							<option value="1">デッキ1</option>
							<option value="2">デッキ2</option>
						</select>
					</label>
					<label>強さ
						<select name="level" required>
							<option value="1">レベル1</option>
							<option value="2">レベル2</option>
							<option value="3">レベル3</option>
							<option value="4">レベル4</option>
							<option value="5">レベル5（最強）</option>
						</select>
					</label>
					<button type="submit" class="btn btn--primary">バトル開始</button>
				</form>
			</section>
			<section class="panel panel--narrow stack season-locked-panel js-season-locked" th:unless="${seasonCpuAdvancedUnlocked}"
			         th:attr="data-season-lock-name='CPU（アドバンスド）',data-season-lock-hint=${seasonCpuAdvancedUnlockHint}">
				<h2 style="margin-top:0;">CPU（アドバンスド）</h2>
				<p class="muted" style="margin:0 0 0.75rem;">すべてのカードと〈フィールド〉を使うCPU。実践に近い。</p>
				<span class="btn btn--primary season-locked-panel__fake-btn" aria-disabled="true">？？？？</span>
			</section>
		</div>
	</th:block>
</div>
<script>
(function () {
	function syncSlotLabels(form) {
		var leagueSel = form.querySelector('select.js-cpu-league-set-select');
		var slotSel = form.querySelector('select.js-cpu-league-slot-select');
		if (!leagueSel || !slotSel || slotSel.options.length < 2) return;
		var opt = leagueSel.options[leagueSel.selectedIndex];
		if (!opt) return;
		var n1 = (opt.getAttribute('data-slot1-name') || '').trim();
		var n2 = (opt.getAttribute('data-slot2-name') || '').trim();
		slotSel.options[0].textContent = n1 || 'デッキ1';
		slotSel.options[1].textContent = n2 || 'デッキ2';
	}
	document.querySelectorAll('.js-cpu-league-start-form').forEach(function (form) {
		var leagueSel = form.querySelector('select.js-cpu-league-set-select');
		if (!leagueSel) return;
		leagueSel.addEventListener('change', function () {
			syncSlotLabels(form);
		});
		syncSlotLabels(form);
	});
})();
</script>
<th:block th:replace="~{fragments/season-lock-tooltip :: tooltip}"></th:block>
<th:block th:replace="~{fragments/authenticated-common-tail :: tail}"></th:block>
</body>
</html>
