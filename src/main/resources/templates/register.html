<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Nine Universe — 新規登録</title>
	<link rel="stylesheet" th:href="@{/css/app.css(v=${assetVersion})}"/>
	<th:block th:replace="~{fragments/desktop-app-update-gate :: head-meta}"></th:block>
</head>
<body class="page page--auth">
<div class="auth-card">
	<div th:replace="~{fragments/game-title-brand :: brand}"></div>
	<p class="error" th:if="${error}" th:text="${error}"></p>
	<p class="ok" th:if="${msg}" th:text="${msg}"></p>
	<form th:action="@{/register}" method="post" class="stack">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		<label>ユーザーID
			<input type="text" name="username" required autocomplete="username"/>
		</label>
		<label>パスワード（4文字以上）
			<input type="password" name="password" required autocomplete="new-password"/>
		</label>
		<button type="submit" class="btn btn--primary">登録</button>
	</form>
	<p><a th:href="@{/login}">ログインへ</a></p>
	<div class="auth-quit-app-wrap" id="auth-quit-app-wrap" hidden>
		<button type="button" class="btn btn--ghost auth-quit-app-btn" id="auth-quit-app-btn">ゲームを終了する</button>
	</div>
</div>
<script th:replace="~{fragments/tab-fullscreen :: script}"></script>
<script th:replace="~{fragments/click-sparkle :: script}"></script>
<script>
(function () {
	var wrap = document.getElementById('auth-quit-app-wrap');
	var btn = document.getElementById('auth-quit-app-btn');
	if (!wrap || !btn) return;
	if (typeof window.nuElectron !== 'undefined' && window.nuElectron && typeof window.nuElectron.quitApp === 'function') {
		wrap.hidden = false;
		btn.addEventListener('click', function () {
			window.nuElectron.quitApp();
		});
	}
})();
</script>
<th:block th:replace="~{fragments/desktop-app-update-gate :: overlay}"></th:block>
</body>
</html>
