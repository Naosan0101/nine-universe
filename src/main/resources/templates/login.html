<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>Nine Universe — ログイン</title>
	<link rel="stylesheet" th:href="@{/css/app.css(v=${assetVersion})}"/>
	<th:block th:replace="~{fragments/desktop-app-update-gate :: head-meta}"></th:block>
</head>
<body class="page page--auth">
<div class="auth-card">
	<div th:replace="~{fragments/game-title-brand :: brand}"></div>
	<p class="ok" th:if="${msg}" th:text="${msg}"></p>
	<p class="muted" th:if="${param.logout}">ログアウトしました。</p>
	<p class="error" th:if="${param.error}">ログインに失敗しました。</p>
	<form th:action="@{/login}" method="post" class="stack">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		<label>ユーザーID
			<input type="text" name="username" required autocomplete="username"/>
		</label>
		<label>パスワード
			<input type="password" name="password" required autocomplete="current-password"/>
		</label>
		<button type="submit" class="btn btn--primary">ログイン</button>
	</form>
	<p><a th:href="@{/register}">新規登録</a></p>
	<div class="auth-quit-app-wrap" id="auth-quit-app-wrap">
		<button type="button" class="btn btn--danger auth-quit-app-btn" id="auth-quit-app-btn">終了</button>
	</div>
</div>

<div id="nu-auth-quit-modal"
     class="nu-home-quit-modal"
     hidden
     role="dialog"
     aria-modal="true"
     aria-labelledby="nu-auth-quit-title"
     aria-hidden="true">
	<div class="nu-home-quit-modal__panel" role="document">
		<h2 id="nu-auth-quit-title" class="nu-home-quit-modal__title">ゲームを終了しますか？</h2>
		<div class="nu-home-quit-modal__actions">
			<button type="button" class="btn btn--ghost" id="nu-auth-quit-cancel">キャンセル</button>
			<button type="button" class="btn btn--primary" id="nu-auth-quit-confirm">終了</button>
		</div>
	</div>
</div>
<script th:replace="~{fragments/tab-fullscreen :: script}"></script>
<script th:replace="~{fragments/click-sparkle :: script}"></script>
<th:block th:replace="~{fragments/cursor-feedback :: scripts}"></th:block>
<script>
(function () {
	function bindAuthQuit() {
		var openBtn = document.getElementById('auth-quit-app-btn');
		var modal = document.getElementById('nu-auth-quit-modal');
		var cancelBtn = document.getElementById('nu-auth-quit-cancel');
		var confirmBtn = document.getElementById('nu-auth-quit-confirm');
		if (!openBtn || !modal || !cancelBtn || !confirmBtn) {
			return;
		}
		var prevFocus = null;
		function closeModal() {
			modal.hidden = true;
			modal.setAttribute('aria-hidden', 'true');
			document.removeEventListener('keydown', onKeyDown);
			if (prevFocus && typeof prevFocus.focus === 'function') {
				try {
					prevFocus.focus();
				} catch (_) {
					/* ignore */
				}
			}
			prevFocus = null;
		}
		function openModal() {
			prevFocus = document.activeElement;
			modal.hidden = false;
			modal.setAttribute('aria-hidden', 'false');
			document.addEventListener('keydown', onKeyDown);
			try {
				cancelBtn.focus();
			} catch (_) {
				/* ignore */
			}
		}
		function onKeyDown(e) {
			if (e.key === 'Escape') {
				e.preventDefault();
				closeModal();
			}
		}
		openBtn.addEventListener('click', function () {
			openModal();
		});
		cancelBtn.addEventListener('click', function () {
			closeModal();
		});
		modal.addEventListener('click', function (e) {
			if (e.target === modal) {
				closeModal();
			}
		});
		confirmBtn.addEventListener('click', function () {
			if (window.nuElectron && typeof window.nuElectron.quitApp === 'function') {
				window.nuElectron.quitApp();
				return;
			}
			try {
				window.close();
			} catch (_) {
				/* ignore */
			}
			closeModal();
		});
	}
	if (document.readyState === 'loading') {
		document.addEventListener('DOMContentLoaded', bindAuthQuit);
	} else {
		bindAuthQuit();
	}
})();
</script>
<th:block th:replace="~{fragments/desktop-app-update-gate :: overlay}"></th:block>
<th:block th:replace="~{fragments/desktop-optional-update-ui :: overlay}"></th:block>
<script th:src="@{/js/desktop-app-update-ui.js(v=${assetVersion})}"></script>
</body>
</html>
