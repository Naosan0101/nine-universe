<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>対戦待機 — ナインユニバース</title>
	<link rel="stylesheet" th:href="@{/css/app.css(v=${assetVersion})}"/>
	<meta name="nine_universe_context_path" th:content="${contextPath != null ? contextPath : ''}"/>
</head>
<body class="page page--theme-arcane">
<header class="topbar">
	<h1 class="game-title">相手の参加を待っています</h1>
	<a class="btn btn--ghost" th:href="@{/home}">ホーム</a>
</header>

<section class="panel panel--narrow" style="max-width:36rem">
	<p>フレンドに対戦申し込みを送りました。相手が「だれかと対戦」からデッキを選んで承諾するとバトルが始まります。相手が3分以内に承諾しない場合は、この部屋は自動的に閉じられます。</p>
	<p class="muted" id="pvp-wait-status">接続確認中…</p>
	<form th:if="${pvpInviteId != null}"
	      th:action="@{/battle/pvp/invite/cancel}"
	      method="post"
	      style="margin-top:1rem">
		<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
		<input type="hidden" name="inviteId" th:value="${pvpInviteId}"/>
		<button type="submit" class="btn btn--ghost">申し込みを取り消す</button>
	</form>
</section>

<script th:inline="javascript">
(function () {
	const matchId = /*[[${matchId}]]*/ '';
	const contextPath = document.querySelector('meta[name="nine_universe_context_path"]')?.getAttribute('content') || '';
	const statusEl = document.getElementById('pvp-wait-status');
	const url = contextPath + '/battle/pvp/api/' + encodeURIComponent(matchId) + '/ready';

	function tick() {
		fetch(url, { headers: { 'Accept': 'application/json' } })
			.then(function (r) { return r.json(); })
			.then(function (j) {
				if (j && j.started) {
					window.setTimeout(function () {
						window.location.href = contextPath + '/battle/pvp/play/' + encodeURIComponent(matchId);
					}, 300);
					return;
				}
				if (j && j.gone) {
					if (statusEl) statusEl.textContent = '部屋が閉じられました（相手が断った・取り消された・または承諾の期限が過ぎました）。';
					window.setTimeout(function () {
						window.location.href = contextPath + '/battle/pvp';
					}, 2200);
					return;
				}
				if (statusEl) statusEl.textContent = '相手の承諾を待っています…';
			})
			.catch(function () {
				if (statusEl) statusEl.textContent = '接続に失敗しました。再読み込みしてください。';
			});
	}
	setInterval(tick, 2000);
	tick();
})();
</script>
<th:block th:replace="~{fragments/authenticated-common-tail :: tail}"></th:block>
</body>
</html>
