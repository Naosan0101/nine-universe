<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>第1ゲーム — デッキ選択 — ナインユニバース</title>
	<link rel="stylesheet" th:href="@{/css/app.css(v=${assetVersion})}"/>
	<meta name="_csrf" th:content="${_csrf.token}"/>
	<meta name="_csrf_header" th:content="${_csrf.headerName}"/>
	<meta name="nine_universe_context_path" th:content="${contextPath != null ? contextPath : ''}"/>
	<meta name="pvp_match_id" th:content="${matchId}"/>
</head>
<body class="page page--theme-arcane">
<header class="topbar">
	<h1 class="game-title">第1ゲームのデッキ</h1>
	<a class="btn btn--ghost" th:href="@{/battle/pvp/league}">リーグ対戦へ</a>
</header>

<div class="container stack panel panel--narrow" style="max-width:32rem">
	<p class="muted" id="pvp-league-pick-status"
	   th:text="|この対戦の第1ゲームで使用するデッキ（${leaguePickSlot1Label} または ${leaguePickSlot2Label}）を選んでください。|">
		この対戦の第1ゲームで使用するデッキを選んでください。
	</p>
	<p class="error" id="pvp-league-pick-error" hidden></p>
	<div class="stack" id="pvp-league-pick-actions">
		<button type="button" class="btn btn--primary" data-slot="1" th:text="|${leaguePickSlot1Label}を使う|">スロット1</button>
		<button type="button" class="btn btn--primary" data-slot="2" th:text="|${leaguePickSlot2Label}を使う|">スロット2</button>
	</div>
</div>

<script>
(function () {
	const matchId = document.querySelector('meta[name="pvp_match_id"]')?.getAttribute('content') || '';
	const contextPath = document.querySelector('meta[name="nine_universe_context_path"]')?.getAttribute('content') || '';
	const csrf = document.querySelector('meta[name="_csrf"]')?.getAttribute('content') || '';
	const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content') || 'X-CSRF-TOKEN';
	const statusEl = document.getElementById('pvp-league-pick-status');
	const errEl = document.getElementById('pvp-league-pick-error');
	const actions = document.getElementById('pvp-league-pick-actions');
	const readyUrl = contextPath + '/battle/pvp/api/' + encodeURIComponent(matchId) + '/ready';
	const slotUrl = contextPath + '/battle/pvp/api/' + encodeURIComponent(matchId) + '/league-first-slot';

	function showErr(msg) {
		if (!errEl) return;
		errEl.textContent = msg || '';
		errEl.hidden = !msg;
	}

	function poll() {
		fetch(readyUrl, { headers: { 'Accept': 'application/json' } })
			.then(function (r) { return r.json(); })
			.then(function (j) {
				if (j && j.started) {
					window.location.href = contextPath + '/battle/pvp/play/' + encodeURIComponent(matchId);
					return;
				}
				if (j && j.gone) {
					if (statusEl) statusEl.textContent = '部屋が閉じられました。';
					return;
				}
				if (statusEl) statusEl.textContent = '相手の選択を待っています…';
			})
			.catch(function () { /* ignore */ });
	}

	if (actions) {
		actions.querySelectorAll('button[data-slot]').forEach(function (btn) {
			btn.addEventListener('click', function () {
				const slot = parseInt(btn.getAttribute('data-slot'), 10);
				showErr('');
				const headers = { 'Accept': 'application/json', 'Content-Type': 'application/x-www-form-urlencoded' };
				if (csrf) headers[csrfHeader] = csrf;
				const body = 'slot=' + encodeURIComponent(String(slot));
				fetch(slotUrl, { method: 'POST', headers: headers, body: body })
					.then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
					.then(function (x) {
						if (!x.ok) {
							showErr((x.j && x.j.error) ? x.j.error : '送信に失敗しました');
							return;
						}
						if (actions) actions.hidden = true;
						poll();
						window.setInterval(poll, 2000);
					})
					.catch(function () {
						showErr('通信に失敗しました');
					});
			});
		});
	}
})();
</script>
<th:block th:replace="~{fragments/authenticated-common-tail :: tail}"></th:block>
</body>
</html>
